# Simple single-container Pod
# Apply: kubectl apply -f 01-pod-simple.yaml
# Test:  kubectl port-forward pod/aaik-simple 8080:80
#        curl http://localhost:8080

apiVersion: v1
kind: Pod
metadata:
  name: aaik-simple
  labels:
    app: aaik
    tier: frontend
spec:
  containers:
  - name: aaik
    image: nginx:alpine
    ports:
    - containerPort: 80
      name: http
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "128Mi"
