# Ingress with TLS termination
# 1. Create TLS secret: kubectl create secret tls aaik-tls --cert=tls.crt --key=tls.key
# 2. Apply: kubectl apply -f 03-ingress-tls.yaml

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aaik-tls-ingress
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - aaik.example.com
    secretName: aaik-tls           # TLS secret with cert and key
  rules:
  - host: aaik.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aaik-clusterip
            port:
              number: 80
