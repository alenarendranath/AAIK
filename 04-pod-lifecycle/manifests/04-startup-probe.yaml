# Startup Probe — for slow-starting apps
# Liveness and readiness probes are DISABLED until startup probe passes
# Apply: kubectl apply -f 04-startup-probe.yaml

apiVersion: v1
kind: Pod
metadata:
  name: aaik-startup
  labels:
    app: aaik
spec:
  containers:
  - name: aaik
    image: nginx:alpine
    ports:
    - containerPort: 80
    # Startup probe: gives app up to 5m to start (30 attempts * 10s = 300s)
    startupProbe:
      httpGet:
        path: /
        port: 80
      failureThreshold: 30
      periodSeconds: 10
    # Once startup probe passes, liveness takes over
    livenessProbe:
      httpGet:
        path: /
        port: 80
      periodSeconds: 10
      failureThreshold: 3
