# Complete Pod with all health features
# startup probe + liveness probe + readiness probe + lifecycle hooks
# Apply: kubectl apply -f 07-full-lifecycle.yaml

apiVersion: v1
kind: Pod
metadata:
  name: aaik-full-health
  labels:
    app: aaik
    version: "1.0"
spec:
  terminationGracePeriodSeconds: 30
  containers:
  - name: aaik
    image: nginx:alpine
    ports:
    - containerPort: 80
      name: http
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
    lifecycle:
      postStart:
        exec:
          command: ["/bin/sh", "-c", "echo 'AAIK starting' >> /var/log/app.log"]
      preStop:
        exec:
          command: ["/bin/sh", "-c", "nginx -s quit && sleep 5"]
    startupProbe:
      httpGet:
        path: /
        port: 80
      failureThreshold: 10
      periodSeconds: 5
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
      successThreshold: 1
