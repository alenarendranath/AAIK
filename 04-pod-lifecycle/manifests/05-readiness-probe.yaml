# Readiness Probe
# Failure = pod REMOVED from Service endpoints (no traffic), NO restart
# Apply: kubectl apply -f 05-readiness-probe.yaml

apiVersion: v1
kind: Pod
metadata:
  name: aaik-readiness
  labels:
    app: aaik
spec:
  containers:
  - name: aaik
    image: nginx:alpine
    ports:
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
      successThreshold: 1
    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 10
