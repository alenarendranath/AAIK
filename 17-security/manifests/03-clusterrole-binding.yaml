# ClusterRole + ClusterRoleBinding — cluster-wide read access
# Apply: kubectl apply -f 03-clusterrole-binding.yaml
# Test:  kubectl auth can-i list nodes --as=system:serviceaccount:default:aaik-sa

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aaik-cluster-reader
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "persistentvolumes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aaik-cluster-reader-binding
subjects:
- kind: ServiceAccount
  name: aaik-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: aaik-cluster-reader
  apiGroup: rbac.authorization.k8s.io
