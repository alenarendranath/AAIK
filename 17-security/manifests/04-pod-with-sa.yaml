# Pod that uses a dedicated ServiceAccount with explicit token mount
# Apply: kubectl apply -f 04-pod-with-sa.yaml
# Verify: kubectl exec aaik-secure-pod -- cat /var/run/secrets/tokens/aaik-token

apiVersion: v1
kind: Pod
metadata:
  name: aaik-secure-pod
  labels:
    app: aaik
spec:
  serviceAccountName: aaik-sa         # use our custom SA instead of default
  automountServiceAccountToken: false # don't auto-mount
  containers:
  - name: aaik
    image: nginx:alpine
    ports:
    - containerPort: 80
    volumeMounts:
    - name: aaik-token
      mountPath: /var/run/secrets/tokens
      readOnly: true
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop: ["ALL"]
  volumes:
  - name: aaik-token
    projected:
      sources:
      - serviceAccountToken:
          path: aaik-token
          expirationSeconds: 3600      # token auto-rotates every hour
          audience: "aaik-api"
