# Secret Volume — mount secrets as files (more secure than env vars)
# Mounted as tmpfs (in-memory), not written to disk
# Apply: kubectl apply -f 04-secret-volume.yaml
# Verify: kubectl exec aaik-secret-vol -- ls /etc/secrets/
#         kubectl exec aaik-secret-vol -- cat /etc/secrets/API_KEY

apiVersion: v1
kind: Secret
metadata:
  name: aaik-credentials
type: Opaque
stringData:
  API_KEY: "my-secret-api-key-xyz"
  DB_PASSWORD: "db-secret-password"

---
apiVersion: v1
kind: Pod
metadata:
  name: aaik-secret-vol
  labels:
    app: aaik
spec:
  containers:
  - name: aaik
    image: nginx:alpine
    volumeMounts:
    - name: secret-vol
      mountPath: /etc/secrets
      readOnly: true             # always mount secrets read-only
  volumes:
  - name: secret-vol
    secret:
      secretName: aaik-credentials
      defaultMode: 0400          # read-only by owner (most restrictive)
