# NodePort Service — accessible via <NodeIP>:<NodePort>
# NodePort range: 30000-32767
# Apply: kubectl apply -f 02-service-nodeport.yaml
# Access: curl http://<any-node-ip>:30080

apiVersion: v1
kind: Service
metadata:
  name: aaik-nodeport
  labels:
    app: aaik
spec:
  type: NodePort
  selector:
    app: aaik
  ports:
  - name: http
    port: 80                       # ClusterIP port (internal)
    targetPort: 80                 # pod port
    nodePort: 30080                # node port (omit to auto-assign 30000-32767)
    protocol: TCP
