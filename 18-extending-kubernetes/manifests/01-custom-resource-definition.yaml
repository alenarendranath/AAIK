# CustomResourceDefinition — defines the AaikDatabase resource type
# Apply: kubectl apply -f 01-custom-resource-definition.yaml
# Verify: kubectl get crds | grep aaik
#         kubectl api-resources | grep aaikdatabase

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aaikdatabases.aaik.dev      # MUST be: plural.group
spec:
  group: aaik.dev
  scope: Namespaced                 # or Cluster for cluster-scoped resources
  names:
    plural: aaikdatabases
    singular: aaikdatabase
    kind: AaikDatabase
    shortNames:
    - aadb                          # kubectl get aadb
  versions:
  - name: v1
    served: true
    storage: true                   # this version is the storage version
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: ["replicas", "storage"]
            properties:
              replicas:
                type: integer
                minimum: 1
                maximum: 10
                description: "Number of database replicas"
              storage:
                type: string
                pattern: '^[0-9]+(Gi|Mi)$'
                description: "Storage size (e.g. 10Gi)"
              version:
                type: string
                default: "15"
                description: "Database engine version"
              backupEnabled:
                type: boolean
                default: false
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, Running, Failed]
              readyReplicas:
                type: integer
              message:
                type: string
    additionalPrinterColumns:       # extra columns in 'kubectl get aadb'
    - name: Replicas
      type: integer
      jsonPath: .spec.replicas
    - name: Storage
      type: string
      jsonPath: .spec.storage
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
    subresources:
      status: {}                    # enable status subresource
